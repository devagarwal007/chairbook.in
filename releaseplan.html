<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SalonBook — Product Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#0F6E56;--teal-l:#E1F5EE;--teal-m:#1D9E75;
  --amber:#EF9F27;--amber-l:#FAEEDA;
  --red:#E24B4A;--red-l:#FCEBEB;
  --blue:#378ADD;--blue-l:#E6F1FB;
  --purple:#6C63FF;--purple-l:#EEEDFE;
  --dark:#0D1F1A;--dark2:#1A2E28;
  --text:#1C2B26;--muted:#5A7068;
  --border:#D8EDE7;--bg:#F7FBF9;--white:#fff;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
.hdr{background:var(--dark);padding:28px 24px 24px;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.06);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:14px;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-mark{width:30px;height:30px;background:var(--teal);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;font-weight:700;}
.logo-txt{font-size:15px;font-weight:600;color:#fff;}
.logo-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px;}
.stats{display:flex;gap:16px;flex-wrap:wrap;}
.stat{text-align:center;}
.stat-n{font-size:18px;font-weight:600;color:#fff;line-height:1;}
.stat-l{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px;text-transform:uppercase;letter-spacing:.04em;}
.prog-bar{height:3px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--teal-m);border-radius:3px;transition:width .5s ease;}
.tabs{display:flex;gap:5px;flex-wrap:wrap;margin-top:12px;}
.tab{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.45);background:transparent;transition:all .15s;white-space:nowrap;}
.tab:hover{color:rgba(255,255,255,.8);}
.tab.on{background:var(--teal);border-color:var(--teal);color:#fff;}

/* MAIN */
.main{max-width:800px;margin:0 auto;padding:24px 16px 60px;}

/* PHASE */
.phase{margin-bottom:2.5rem;}
.phase-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:12px 16px;border-radius:12px;background:var(--white);border:1px solid var(--border);}
.phase-icon{font-size:20px;}
.phase-info{flex:1;}
.phase-name{font-size:14px;font-weight:700;color:var(--dark);}
.phase-sub{font-size:12px;color:var(--muted);margin-top:1px;}
.phase-prog{text-align:right;}
.phase-pct{font-size:18px;font-weight:700;color:var(--teal);}
.phase-cnt{font-size:11px;color:var(--muted);}

/* WEEK */
.week{margin-bottom:12px;}
.week-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px;padding-left:4px;}

/* TASK */
.task{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:6px;transition:border-color .15s,box-shadow .15s;}
.task:hover{border-color:#b8d9cf;box-shadow:0 2px 8px rgba(15,110,86,.06);}
.task.done{opacity:.45;}
.task.done .task-name{text-decoration:line-through;color:var(--muted);}
.task-top{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;cursor:pointer;}
.chk{width:18px;height:18px;border-radius:5px;border:1.5px solid #c5d9d4;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.chk.on{background:var(--teal);border-color:var(--teal);}
.chk.on::after{content:'✓';font-size:10px;color:#fff;font-weight:700;}
.pri{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.task-body{flex:1;min-width:0;}
.task-name{font-size:13.5px;font-weight:500;color:var(--dark);line-height:1.3;}
.task-desc{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5;}
.task-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;align-items:center;}
.tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;}
.t-fix{background:var(--red-l);color:#791F1F;}
.t-v1{background:var(--teal-l);color:var(--teal);}
.t-v2{background:var(--blue-l);color:#0C447C;}
.t-v3{background:var(--purple-l);color:#3C3489;}
.t-launch{background:var(--amber-l);color:#633806;}
.ai-btn{flex-shrink:0;margin-left:auto;font-size:11px;font-weight:600;padding:4px 10px;border-radius:7px;background:var(--bg);color:var(--muted);cursor:pointer;border:1px solid var(--border);white-space:nowrap;transition:all .15s;}
.ai-btn:hover{background:var(--teal);color:#fff;border-color:var(--teal);}

/* PROMPT BOX */
.prompt{display:none;border-top:1px solid var(--border);background:#F0F8F5;padding:13px 15px;}
.prompt.open{display:block;}
.prompt-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--teal);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.prompt-txt{font-family:var(--mono);font-size:11.5px;color:var(--dark);line-height:1.75;background:var(--white);border:1px solid var(--border);border-radius:8px;padding:12px 13px;white-space:pre-wrap;word-break:break-word;max-height:240px;overflow-y:auto;}
.cp-btn{margin-top:9px;display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:6px 15px;border-radius:8px;background:var(--teal);color:#fff;cursor:pointer;border:none;transition:all .15s;}
.cp-btn:hover{background:#0a5440;}
.cp-btn.done-cp{background:var(--blue);}

/* MILESTONE */
.milestone{background:var(--dark);border-radius:10px;padding:11px 15px;margin:4px 0 14px;display:flex;align-items:center;gap:10px;}
.ms-ico{font-size:18px;flex-shrink:0;}
.ms-t{font-size:13px;font-weight:600;color:#fff;}
.ms-s{font-size:11.5px;color:rgba(255,255,255,.4);margin-top:1px;}

@media(max-width:480px){
  .hdr{padding:16px;}
  .stat-n{font-size:15px;}
  .task-top{padding:9px 11px;}
  .prompt-txt{font-size:11px;}
}
</style>
</head>

    <div class="logo">
      <div class="logo-mark">S</div>

        <div class="logo-txt">SalonBook</div>
        <div class="logo-sub">Product Roadmap — 6 months</div>
      </div>
    </div>

      <div class="stat"><div class="stat-n" id="s-done">0</div><div class="stat-l">Done</div></div>

      <div class="stat"><div class="stat-n" id="s-pct">0%</div><div class="stat-l">Progress</div></div>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>

<div class="main" id="main"></div>

    {id:5,v:'v1',p:'high',name:'Feature Gating (plan-based access)',
     desc:'Control which pages each plan can access. Show blurred upgrade screen for locked features — never hide them.',
     prompt:`I am building SalonBook — a salon SaaS with 3 plans: Free, Pro (₹499/mo), Chain (₹1,499/mo).

2. canAccess(feature, plan) utility — returns true/false

3. useFeatureGate(feature) React hook — returns {allowed, plan, upgradeTo}

4. <FeatureGate feature="crm"> wrapper component:
   - If allowed: renders children normally
   - If NOT allowed: shows blurred/locked screen with upgrade CTA
   - NEVER hide the page completely — users who SEE what they're missing convert better

5. API route middleware to protect endpoints by plan

6. Supabase: salon table has plan column. Show how to fetch and cache in React context.

Stack: Next.js 14, Supabase, TypeScript, Tailwind. Full implementation.`},

    {id:19,v:'launch',p:'med',name:'Research competitor platforms',

let done=new Set(),openP=new Set(),cur='all';
function load(){try{done=new Set(JSON.parse(localStorage.getItem('sb_rm3')||'[]'));}catch(e){}}
function save(){try{localStorage.setItem('sb_rm3',JSON.stringify([...done]));}catch(e){}}
function allTasks(){return PHASES.flatMap(p=>p.weeks.flatMap(w=>w.tasks));}
function updateStats(){
  const all=allTasks(),tot=all.length,dn=all.filter(t=>done.has(t.id)).length;
  document.getElementById('s-done').textContent=dn;
  document.getElementById('s-left').textContent=tot-dn;
  document.getElementById('s-pct').textContent=Math.round(dn/tot*100)+'%';
  document.getElementById('prog').style.width=Math.round(dn/tot*100)+'%';
}
function go(id,el){
  cur=id;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  render();
}
function tog(id){done.has(id)?done.delete(id):done.add(id);save();render();}
function togP(id,e){e.stopPropagation();openP.has(id)?openP.delete(id):openP.add(id);render();}
function cp(id,e){
  e.stopPropagation();
  const t=allTasks().find(t=>t.id===id);
  if(!t)return;
  navigator.clipboard.writeText(t.prompt).then(()=>{
    const b=document.getElementById('cp'+id);
    if(b){b.textContent='✓ Copied!';b.classList.add('done-cp');setTimeout(()=>{b.textContent='📋 Copy prompt';b.classList.remove('done-cp');},2000);}
  });
}

function buildTabs(){
  const el=document.getElementById('tabs');
  const btns=[{id:'all',lbl:'All phases'},...PHASES.map(p=>({id:p.id,lbl:p.name.split('—')[0].trim()}))];
  el.innerHTML=btns.map(b=>`<button class="tab ${b.id==='all'?'on':''}" onclick="go('${b.id}',this)">${b.lbl}</button>`).join('');
}

function render(){
  const main=document.getElementById('main');main.innerHTML='';
  const show=cur==='all'?PHASES:PHASES.filter(p=>p.id===cur);
  show.forEach(ph=>{
    const ptasks=ph.weeks.flatMap(w=>w.tasks);
    const pdn=ptasks.filter(t=>done.has(t.id)).length;
    const pct=Math.round(pdn/ptasks.length*100);
    const ph_el=document.createElement('div');ph_el.className='phase';
    ph_el.innerHTML=`
      <div class="phase-hdr">
        <div class="phase-icon">${ph.icon}</div>
        <div class="phase-info">
          <div class="phase-name">${ph.name}</div>
          <div class="phase-sub">${ph.sub}</div>
        </div>
        <div class="phase-prog">
          <div class="phase-pct">${pct}%</div>
          <div class="phase-cnt">${pdn}/${ptasks.length} done</div>
        </div>
      </div>`;
    ph.weeks.forEach(w=>{
      const w_el=document.createElement('div');w_el.className='week';
      w_el.innerHTML=`<div class="week-lbl">${w.t}</div><div class="tasks-wrap"></div>`;
      ph_el.appendChild(w_el);
      const tw=w_el.querySelector('.tasks-wrap');
      w.tasks.forEach(t=>{
        const isd=done.has(t.id),iso=openP.has(t.id);
        const pc=t.p==='high'?'#E24B4A':t.p==='med'?'#EF9F27':'#378ADD';
        const c=document.createElement('div');c.className=`task${isd?' done':''}`;
        const escaped=t.prompt.replace(/</g,'&lt;').replace(/>/g,'&gt;');
        c.innerHTML=`
          <div class="task-top" onclick="tog(${t.id})">
            <div class="chk${isd?' on':''}"></div>
            <div class="pri" style="background:${pc}"></div>
            <div class="task-body">
              <div class="task-name">${t.name}</div>
              <div class="task-desc">${t.desc}</div>
              <div class="task-tags"><span class="tag t-${t.v}">${t.v.toUpperCase()}</span></div>
            </div>
            <button class="ai-btn" onclick="togP(${t.id},event)">${iso?'▲ Hide':'🤖 AI prompt'}</button>
          </div>
          <div class="prompt${iso?' open':''}">
            <div class="prompt-lbl">🤖 Copy → paste into Claude or Cursor to build this feature</div>
            <div class="prompt-txt">${escaped}</div>
            <button class="cp-btn" id="cp${t.id}" onclick="cp(${t.id},event)">📋 Copy prompt</button>
          </div>`;
        tw.appendChild(c);
      });
    });
    const ms=document.createElement('div');ms.className='milestone';
    ms.innerHTML=`<div class="ms-ico">${ph.ms.i}</div><div><div class="ms-t">${ph.ms.t}</div><div class="ms-s">${ph.ms.s}</div></div>`;
    ph_el.appendChild(ms);
    main.appendChild(ph_el);
  });
  updateStats();
}

load();buildTabs();render();
</script>
